<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEEGO — Revenue Action Plan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #F5C842;
  --teal: #4ECDC4;
  --orange: #FF6B35;
  --bg: #F5F2EC;
  --header-bg: #0D0D0D;
  --card-bg: #ffffff;
  --text: #1a1a1a;
  --text-muted: #666;
  --border: #e8e3da;
  --impact-high: #F5C842;
  --impact-med: #8BAD8B;
  --impact-low: #B0A8C8;
  --shadow: 0 2px 8px rgba(0,0,0,0.07);
  --shadow-hover: 0 6px 20px rgba(0,0,0,0.12);
}

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── STICKY HEADER ── */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--header-bg);
  color: #fff;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  border-bottom: 2px solid var(--gold);
}

.site-header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--gold);
  white-space: nowrap;
}

.legend {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: rgba(255,255,255,0.7);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--header-bg);
  padding: 0 24px 14px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding: 6px 14px;
  border: 1px solid rgba(255,255,255,0.2);
  background: transparent;
  color: rgba(255,255,255,0.6);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.filter-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.filter-btn.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #0D0D0D;
}

.filter-btn.f-teal.active {
  background: var(--teal);
  border-color: var(--teal);
  color: #0D0D0D;
}

.filter-btn.f-orange.active {
  background: var(--orange);
  border-color: var(--orange);
  color: #fff;
}

/* ── MAIN GRID ── */
.main {
  padding: 24px;
  max-width: 1400px;
  margin: 0 auto;
}

.columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  transition: grid-template-columns 0.3s ease;
}

.column {
  display: flex;
  flex-direction: column;
  gap: 0;
  transition: opacity 0.25s ease;
}

.column.hidden {
  display: none;
}

.column-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}

.column-header h2 {
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.col-badge {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500;
}

.col-badge.teal { background: rgba(78,205,196,0.15); color: var(--teal); }
.col-badge.orange { background: rgba(255,107,53,0.12); color: var(--orange); }

/* ── PHASE LABEL ── */
.phase-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 20px 0 8px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}

.phase-label:first-child {
  border-top: none;
  margin-top: 0;
  padding-top: 0;
}

/* ── CARDS ── */
.card {
  background: var(--card-bg);
  border-radius: 8px;
  border: 1px solid var(--border);
  border-left: 4px solid var(--impact-high);
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s ease, transform 0.2s ease;
  overflow: hidden;
}

.card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.card[data-impact="med"] { border-left-color: var(--impact-med); }
.card[data-impact="low"] { border-left-color: var(--impact-low); }

.card.hidden { display: none; }

.card-header {
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.card-header:focus { outline: 2px solid var(--gold); outline-offset: -2px; }

.card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.card-id {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-muted);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}

.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  flex: 1;
  line-height: 1.3;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
  flex-shrink: 0;
}

.time-pill {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--bg);
  color: var(--text-muted);
  white-space: nowrap;
}

.expand-icon {
  font-size: 1.1rem;
  font-weight: 300;
  color: var(--text-muted);
  transition: transform 0.25s ease;
  line-height: 1;
  width: 20px;
  text-align: center;
}

.card.expanded .expand-icon { transform: rotate(45deg); }

.card-subtitle {
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.4;
}

/* ── EXPANDED BODY ── */
.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}

.card.expanded .card-body { max-height: 600px; }

.card-body-inner {
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.detail-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 12px;
  margin-bottom: 4px;
}

.how-text {
  font-size: 0.8rem;
  line-height: 1.6;
  color: #333;
}

.steps-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.steps-list li {
  font-size: 0.78rem;
  line-height: 1.5;
  padding-left: 16px;
  position: relative;
  color: #333;
}

.steps-list li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--text-muted);
}

.revenue-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  background: rgba(245,200,66,0.12);
  color: #8a6d00;
  border: 1px solid rgba(245,200,66,0.3);
  margin-top: 4px;
  align-self: flex-start;
}

.revenue-pill::before { content: '↗'; font-size: 0.8rem; }

/* ── RESPONSIVE ── */
@media (max-width: 680px) {
  .columns { grid-template-columns: 1fr !important; }
  .site-header { padding: 12px 16px; }
  .site-header h1 { font-size: 0.85rem; }
  .filter-bar { padding: 0 16px 12px; gap: 6px; }
  .main { padding: 16px; }
  .legend { gap: 8px; }
}

/* ── PRINT ── */
@media print {
  .site-header, .filter-bar { position: static; }
  .filter-btn { display: none; }
  .card-body { max-height: none !important; overflow: visible !important; }
  .card:hover { transform: none; box-shadow: var(--shadow); }
  .expand-icon { display: none; }
  .columns { grid-template-columns: 1fr 1fr !important; }
}
</style>
</head>

// ── RENDER ────────────────────────────────────────────────────────────────────

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderCards(cards, containerId) {
  const container = document.getElementById(containerId);
  let currentPhase = null;
  let html = '';

  cards.forEach(card => {
    if (card.phaseLabel !== currentPhase) {
      currentPhase = card.phaseLabel;
      html += `<div class="phase-label">${escapeHtml(card.phaseLabel)}</div>`;
    }

    const stepsHtml = card.steps.map(s => `<li>${escapeHtml(s)}</li>`).join('');

    html += `
      <div class="card" data-id="${escapeHtml(card.id)}" data-type="${card.type}" data-impact="${card.impact}" tabindex="0" role="button" aria-expanded="false">
        <div class="card-header">
          <div class="card-top">
            <span class="card-id">${escapeHtml(card.id)}</span>
            <span class="card-title">${escapeHtml(card.title)}</span>
            <div class="card-meta">
              <span class="time-pill">${escapeHtml(card.time)}</span>
              <span class="expand-icon">+</span>
            </div>
          </div>
          <div class="card-subtitle">${escapeHtml(card.subtitle)}</div>
        </div>
        <div class="card-body">
          <div class="card-body-inner">
            <div>
              <div class="detail-label">How</div>
              <p class="how-text">${escapeHtml(card.how)}</p>
            </div>
            <div>
              <div class="detail-label">Steps</div>
              <ul class="steps-list">${stepsHtml}</ul>
            </div>
            <span class="revenue-pill">${escapeHtml(card.revenue)}</span>
          </div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

const virtualCards = CARDS.filter(c => c.type === 'virtual');
const bootsCards   = CARDS.filter(c => c.type === 'boots');

renderCards(virtualCards, 'cards-virtual');
renderCards(bootsCards,   'cards-boots');

// ── CARD TOGGLE ───────────────────────────────────────────────────────────────

document.addEventListener('click', e => {
  const header = e.target.closest('.card-header');
  if (!header) return;
  const card = header.closest('.card');
  const expanded = card.classList.toggle('expanded');
  card.setAttribute('aria-expanded', expanded);
});

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const card = e.target.closest('.card');
  if (!card) return;
  e.preventDefault();
  const expanded = card.classList.toggle('expanded');
  card.setAttribute('aria-expanded', expanded);
});

// ── FILTERS ───────────────────────────────────────────────────────────────────

const filterBtns = document.querySelectorAll('.filter-btn');
const columns    = document.getElementById('columns');
const colVirtual = document.getElementById('col-virtual');
const colBoots   = document.getElementById('col-boots');

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(btn.dataset.filter);
  });
});

function applyFilter(filter) {
  const allCards = document.querySelectorAll('.card');

  allCards.forEach(card => {
    const type   = card.dataset.type;
    const impact = card.dataset.impact;
    let visible = false;

    if (filter === 'all')     visible = true;
    else if (filter === 'virtual') visible = type === 'virtual';
    else if (filter === 'boots')   visible = type === 'boots';
    else if (filter === 'high')    visible = impact === 'high';
    else if (filter === 'med')     visible = impact === 'med';

    card.classList.toggle('hidden', !visible);
  });

  // Column collapse logic
  if (filter === 'virtual') {
    colVirtual.classList.remove('hidden');
    colBoots.classList.add('hidden');
    columns.style.gridTemplateColumns = '1fr';
  } else if (filter === 'boots') {
    colVirtual.classList.add('hidden');
    colBoots.classList.remove('hidden');
    columns.style.gridTemplateColumns = '1fr';
  } else {
    colVirtual.classList.remove('hidden');
    colBoots.classList.remove('hidden');
    columns.style.gridTemplateColumns = '';
  }

  // Hide phase labels that have no visible cards below them
  document.querySelectorAll('.phase-label').forEach(label => {
    let next = label.nextElementSibling;
    let hasVisible = false;
    while (next && !next.classList.contains('phase-label')) {
      if (!next.classList.contains('hidden')) { hasVisible = true; break; }
      next = next.nextElementSibling;
    }
    label.style.display = hasVisible ? '' : 'none';
  });
}
</script>
